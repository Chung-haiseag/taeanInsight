# Cloudflare Pages 배포 설정 — insight.taeannews.co.kr
# 사용: npm run deploy:cf (또는 GitHub 연동 시 자동 배포)

name = "taean-insight"
compatibility_date = "2026-05-27"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".vercel/output/static"

# 환경변수 (시크릿은 대시보드에서 별도 설정)
# - ANTHROPIC_API_KEY, TOGETHER_API_KEY 등은 Pages → Settings → Environment variables (Secret)
# 여기에는 비밀이 아닌 설정만 두기

[vars]
NEXT_PUBLIC_SITE_NAME = "태안 AI 인텔리전스"
NEXT_PUBLIC_API_BASE_URL = "https://api.insight.taeannews.co.kr"

# 향후 Workers KV·R2·D1 바인딩 시 추가
# [[kv_namespaces]]
# binding = "CACHE"
# id = "..."

# [[r2_buckets]]
# binding = "REPORTS"
# bucket_name = "taean-insight-reports"
